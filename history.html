<!DOCTYPE html>
<html>
<head>
    <title>DKBank - История операций</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f1a;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding-top: 30px;
        }
        h1 { color: #ffd700; font-size: 28px; margin-bottom: 20px; }
        
        .history-list { width: 420px; margin: 0 auto; text-align: left; }
        
        .transaction {
            background-color: #1a1a2e;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        .transaction .icon { font-size: 28px; margin-right: 12px; }
        .transaction .info { flex: 1; }
        .transaction .info .name { font-weight: bold; font-size: 14px; }
        .transaction .info .date { font-size: 11px; color: #888; }
        .transaction .amount { font-weight: bold; font-size: 16px; }
        .positive { color: #2ecc71; }
        .negative { color: #e74c3c; }
        
        .receipt-btn {
            background: none; border: none; color: #ffd700;
            font-size: 20px; cursor: pointer; margin-left: 10px;
        }
        .receipt-btn:hover { color: #fff; }
        
        .back-link {
            display: inline-block; margin-top: 20px;
            color: #aaa; text-decoration: none; font-size: 14px;
        }
        .back-link:hover { color: #ffd700; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <h1>📜 История операций</h1>
    
    <div class="history-list" id="historyList">
        <p style="text-align: center; color: #aaa;">Загрузка...</p>
    </div>
    
    <a href="dashboard.html" class="back-link">← Назад в банк</a>

    <script>
        const SERVER = 'https://dkbank-server.onrender.com';
        var currentUser = localStorage.getItem("dkbank_logged_in");
        if (!currentUser) window.location.href = "index.html";
        
        loadHistory();
        
        async function loadHistory() {
            try {
                var res = await fetch(SERVER + '/api/history/' + currentUser);
                var data = await res.json();
                var list = document.getElementById("historyList");
                
                if (data.success && data.transactions.length > 0) {
                    var html = "";
                    for (var i = 0; i < data.transactions.length; i++) {
                        var t = data.transactions[i];
                        var icon, name, amountClass, amountPrefix;
                        
                        if (t.type === 'transfer' && t.from === currentUser) {
                            icon = '💸'; name = 'Перевод → <b>' + t.to + '</b>';
                            amountClass = 'negative'; amountPrefix = '-';
                        } else if (t.type === 'transfer' && t.to === currentUser) {
                            icon = '📥'; name = 'Перевод от <b>' + t.from + '</b>';
                            amountClass = 'positive'; amountPrefix = '+';
                        } else if (t.type === 'give' || t.type === 'topup') {
                            icon = '🎁'; name = 'Пополнение';
                            amountClass = 'positive'; amountPrefix = '+';
                        } else if (t.type === 'take') {
                            icon = '🗑️'; name = 'Списание';
                            amountClass = 'negative'; amountPrefix = '-';
                        } else if (t.type === 'fine') {
                            icon = '⚠️'; name = 'Штраф';
                            amountClass = 'negative'; amountPrefix = '-';
                        } else if (t.type === 'gift') {
                            icon = '🎉'; name = 'Подарочная карта';
                            amountClass = 'positive'; amountPrefix = '+';
                        } else {
                            icon = '🔄'; name = 'Операция';
                            amountClass = 'positive'; amountPrefix = '';
                        }
                        
                        var amountStr = amountPrefix + '♎' + t.amount;
                        
                        html += `
                            <div class="transaction">
                                <span class="icon">${icon}</span>
                                <div class="info">
                                    <div class="name">${name}</div>
                                    <div class="date">${t.date}</div>
                                </div>
                                <span class="amount ${amountClass}">${amountStr}</span>
                                <button class="receipt-btn" onclick='showReceipt(${JSON.stringify(t)})'>🔁</button>
                            </div>
                        `;
                    }
                    list.innerHTML = html;
                } else {
                    list.innerHTML = '<p style="text-align: center; color: #aaa;">Пока нет операций</p>';
                }
            } catch (e) {
                document.getElementById("historyList").innerHTML = '<p style="color: #e74c3c;">Ошибка загрузки</p>';
            }
        }
        
        async function showReceipt(t) {
            var fromProfile = await getProfile(t.from || currentUser);
            var toProfile = await getProfile(t.to || '');
            
            var fromName = fromProfile.firstName || 'Неизвестно';
            var fromLastName = fromProfile.lastName || '';
            var toName = toProfile.firstName || 'Неизвестно';
            var toLastName = toProfile.lastName || '';
            
            var amountPrefix = (t.from === currentUser || t.type === 'take' || t.type === 'fine') ? '-' : '+';
            var amountStr = amountPrefix + '♎' + t.amount;
            
            var overlay = document.createElement('div');
            overlay.id = 'receiptOverlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;';
            overlay.innerHTML = `
                <div id="receiptCard" style="background:#fff;border-radius:15px;padding:30px;width:380px;text-align:center;color:#000;">
                    <p style="color:#888;font-size:12px;">_________________________________</p>
                    <p style="color:#888;font-size:12px;">_______________DK Bank 🌐________________</p>
                    <br>
                    <p style="color:#000;font-size:18px;font-weight:bold;">Одобренный чек</p>
                    <p style="color:#555;font-size:12px;">Damer Karagat 🧑‍🧑‍🧒</p>
                    <hr style="margin:15px 0;">
                    
                    <table style="width:100%;text-align:left;font-size:13px;color:#333;">
                        <tr><td style="color: #888;">Имя отправителя:</td><td><b>${fromName}</b></td></tr>
                        <tr><td style="color:#888;">Фамилия отправителя:</td><td><b>${fromLastName || 'Неизвестно'}</b></td></tr>
                        <tr><td style="color:#888;">Дата отправления:</td><td><b>${t.date}</b></td></tr>
                        <tr><td style="color:#888;">Имя получателя:</td><td><b>${toName} ${toLastName}</b></td></tr>
                        <tr><td style="color:#888;">Фамилия получателя:</td><td><b>${toLastName || 'Неизвестно'}</b></td></tr>
                        <tr><td style="color:#888;">Сумма:</td><td><b style="color:${amountPrefix === '+' ? '#2ecc71' : '#e74c3c'};">${amountStr}</b></td></tr>
                        <tr><td style="color:#888;">Номер / Банк:</td><td><b>4196***</b></td></tr>
                    </table>
                    
                    <hr style="margin:15px 0;">
                    <p style="color:#888;font-size:11px;">DKBank © 2025 | Чек действителен</p>
                    
                    <button onclick="downloadReceipt()" style="margin-top:15px;padding:10px 25px;background:#2ecc71;color:#fff;border:none;border-radius:20px;cursor:pointer;font-weight:bold;">📥 Скачать PNG</button>
                    <br>
                    <button onclick="closeReceipt()" style="margin-top:8px;padding:8px 25px;background:#555;color:#ccc;border:none;border-radius:20px;cursor:pointer;">Закрыть</button>
                </div>
            `;
            overlay.onclick = function(e) { if (e.target === overlay) closeReceipt(); };
            document.body.appendChild(overlay);
        }
        
        async function getProfile(nick) {
            if (!nick) return {};
            try {
                var res = await fetch(SERVER + '/api/profile/' + nick);
                var data = await res.json();
                return data.success ? data : {};
            } catch (e) { return {}; }
        }
        
        function downloadReceipt() {
            var card = document.getElementById("receiptCard");
            html2canvas(card).then(function(canvas) {
                var link = document.createElement('a');
                link.download = 'чек_DKBank.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
        
        function closeReceipt() {
            var overlay = document.getElementById("receiptOverlay");
            if (overlay) overlay.remove();
        }
    </script>
</body>
</html>
